name: 🎬 L'Écho du Matin - Pipeline Quotidien

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    
    steps:
      - name: ✅ Checkout repo
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: 📚 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: 🎬 Générer articles et vidéos
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python scripts/articles_pipeline.py
      
      - name: 💾 Commit articles + vidéos
        run: |
          git config user.name "🤖 L'Écho Bot"
          git config user.email "echo@lechodumatin.com"
          git add public/
          git commit -m "📰 Articles + vidéos $(date +'%Y-%m-%d')" || echo "Rien à commiter"
          git pull --rebase origin main || true
          git push origin main || echo "Push échoué"
      
      - name: 🚀 Redeploy Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
 
